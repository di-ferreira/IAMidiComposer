# AI MIDI Composer — CI
#
# Stages:
#   1. proto_codegen  — gera stubs Go a partir do proto e falha se houver drift.
#   2. engine_cpp     — matrix multi-OS (Ubuntu/macOS/Windows), CMake + GoogleTest.
#   3. plugin         — VST3 build (Ubuntu only até ADR-0007 codesigning).
#   4. engine_go      — matrix multi-OS, Go build + vet + test.
#   5. lint           — clang-format + gofmt/goimports (Ubuntu only, OS-agnóstico).
#
# Benchmarks (placeholder CMake AIMIDI_BUILD_BENCHMARKS) ficam para Fase 7.
name: CI

on:
  push:
    branches: [main, release/*]
    tags: [v*]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────
  # Objetivo 2: Proto codegen + drift detection.
  # Roda ANTES dos demais (sem needs). Se os stubs gerados divergirem do
  # que está commitado, este job falha — garantindo que o repo esteja
  # sempre em sync com o .proto.
  #
  # To update proto stubs locally, run the same `protoc` command;
  # this job enforces drift-free generated code.
  proto_codegen:
    name: Proto codegen + sync
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth 1 é suficiente para que `git diff --exit-code`
          # detecte drift (sem diff = stubs em sync).
          fetch-depth: 1
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install protoc + Go plugins
        run: |
          # Preferimos apt por simplicidade e determinismo no CI.
          # Alternativa: baixar release oficial do protobuf (ver comentado).
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends protobuf-compiler unzip
          # protoc-gen-go e protoc-gen-go-grpc via go install.
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Generate Go stubs from proto
        run: |
          protoc \
            --proto_path=proto \
            --go_out=engine/go/internal/proto \
            --go_opt=module=aimidi.composer/ace/internal/proto \
            --go-grpc_out=engine/go/internal/proto \
            --go-grpc_opt=module=aimidi.composer/ace/internal/proto \
            proto/aimidi/v1/aimidi.proto
      - name: Verify no drift (generated == committed)
        run: |
          git diff --exit-code engine/go/internal/proto/aimidi/v1/ \
            || (echo "::error::proto codegen desatualizado — rode 'make proto' ou os comandos do job e commit" && exit 1)

  # ───────────────────────────────────────────────────────────────
  # Objetivo 1: Engine (C++) multi-OS matrix.
  # clang-format/clang-tidy só instalados em Ubuntu (Objetivo 4);
  # clang-tidy ainda não roda no build (opcional nesta fase).
  engine_cpp:
    name: Engine (C++) [${{ matrix.os }}]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-13, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Install toolchain (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build clang clang-format clang-tidy
      - name: Install toolchain (macos)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja clang
      - name: Install toolchain (windows)
        if: runner.os == 'Windows'
        run: |
          choco install -y cmake ninja llvm
      - name: Configure
        shell: bash
        run: |
          # Em Linux/macOS usamos -G Ninja; em Windows tentamos Ninja
          # (instalado via chocolatey) — fallback default funcionaria também.
          GENERATOR="Ninja"
          EXTRA_FLAGS=""
          if [ "${{ runner.os }}" = "macOS" ]; then
            EXTRA_FLAGS="-DCMAKE_CXX_COMPILER=clang++"
          fi
          # Em Windows, o LLVM instalado pelo choco traz clang++ no PATH.
          cmake -S . -B build -G "$GENERATOR" $EXTRA_FLAGS \
            -DCMAKE_BUILD_TYPE=Debug \
            -DAIMIDI_BUILD_PLUGIN=OFF \
            -DAIMIDI_BUILD_ENGINE_CPP=ON \
            -DAIMIDI_BUILD_TESTS=ON \
            -DAIMIDI_ENABLE_ASAN=ON \
            -DAIMIDI_ENABLE_UBSAN=ON
      - name: Build
        shell: bash
        run: cmake --build build --parallel
      - name: Test
        working-directory: build
        shell: bash
        run: ctest --output-on-failure

  # ───────────────────────────────────────────────────────────────
  # Plugin (VST3) — Ubuntu only enquanto ADR-0007 (codesigning/
  # entitlements para macOS/Windows) não é implementada.
  # continue-on-error REMOVIDO: se quebrar, deve quebrar.
  plugin:
    name: Plugin (VST3) build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build clang pkg-config \
            libasound2-dev libx11-dev libxcomposite-dev libxcursor-dev \
            libxext-dev libxinerama-dev libxrandr-dev libxrender-dev \
            libfreetype6-dev libgl1-mesa-dev libglu1-mesa-dev
      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DAIMIDI_BUILD_PLUGIN=ON \
            -DAIMIDI_BUILD_ENGINE_CPP=OFF
      - name: Build
        run: cmake --build build --parallel
      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-midi-plugin-vst3-${{ github.sha }}
          path: build/plugin/ai_midi_composer_artefacts/Release/VST3/
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────
  # Objetivo 1: ACE (Go) multi-OS matrix.
  # setup-go@v5 cuida da instalação em todos os OSes; não há actions/cache
  # explícito pois setup-go já faz cache do module path.
  engine_go:
    name: ACE (Go) [${{ matrix.os }}]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-13, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        working-directory: engine/go
        run: go build ./...
      - name: Vet
        working-directory: engine/go
        run: go vet ./...
      - name: Test
        working-directory: engine/go
        shell: bash
        run: |
          # Go tests are empty for now; will populate as handlers are added (Fase 1.2 do ROADMAP)
          go test ./... -race -shuffle=on

  # ───────────────────────────────────────────────────────────────
  # Objetivo 3: lint sem continue-on-error.
  # clang-format e goimports são OS-agnósticos; Ubuntu é suficiente.
  lint:
    name: Format check (C++ / Go)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang-format
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: clang-format check (C++)
        run: |
          find engine/cpp plugin -name '*.?pp' -print0 \
            | xargs -0 -r -n1 clang-format -i --dry-run --Werror
      - name: gofmt / goimports check (Go)
        working-directory: engine/go
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          test -z "$(gofmt -s -l . | tee /dev/stderr)"
          test -z "$(find . -name '*.go' -not -path './internal/proto/*' \
            | xargs -r $(go env GOPATH)/bin/goimports -l | tee /dev/stderr)"

  # ───────────────────────────────────────────────────────────────
  # Release — triggered by tags (v*) on main/release branches.
  # Builds all platforms in Release mode and creates a GitHub Release
  # with VST3 plugin + CLI binaries attached.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Release [${{ matrix.os }}]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: linux
            cmake_extra: -DAIMIDI_BUILD_PLUGIN=ON
          - os: macos-13
            artifact_name: macos
            cmake_extra: "-DAIMIDI_BUILD_PLUGIN=ON -DCMAKE_CXX_COMPILER=clang++"
          - os: windows-2022
            artifact_name: windows
            cmake_extra: "-DAIMIDI_BUILD_PLUGIN=ON"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Install toolchain (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build clang pkg-config \
            libasound2-dev libx11-dev libxcomposite-dev libxcursor-dev \
            libxext-dev libxinerama-dev libxrandr-dev libxrender-dev \
            libfreetype6-dev libgl1-mesa-dev libglu1-mesa-dev
      - name: Install toolchain (macos)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja clang
      - name: Install toolchain (windows)
        if: runner.os == 'Windows'
        run: |
          choco install -y cmake ninja llvm
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            ${{ matrix.cmake_extra }} \
            -DAIMIDI_BUILD_ENGINE_CPP=ON
      - name: Build plugin + engine
        shell: bash
        run: cmake --build build --parallel
      - name: Build Go ACE
        working-directory: engine/go
        run: go build -o ../../build/bin/ace_server ./cmd/ace/
      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp build/bin/Release/*.exe dist/${{ matrix.artifact_name }}/ 2>/dev/null || true
            cp build/plugin/ai_midi_composer_artefacts/Release/VST3/*.vst3 dist/${{ matrix.artifact_name }}/ 2>/dev/null || true
          else
            cp build/bin/* dist/${{ matrix.artifact_name }}/ 2>/dev/null || true
            cp -r build/plugin/ai_midi_composer_artefacts/Release/VST3/*.vst3 dist/${{ matrix.artifact_name }}/ 2>/dev/null || true
          fi
          cp build/bin/mte_cli dist/${{ matrix.artifact_name }}/ 2>/dev/null || true
          cp build/bin/ace_server dist/${{ matrix.artifact_name }}/ 2>/dev/null || true
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-midi-composer-${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}/*
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: AI MIDI Composer ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: true
          files: |
            dist/${{ matrix.artifact_name }}/*
