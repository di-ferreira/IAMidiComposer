# Skill Registry — AI MIDI Composer
# Metadados descritivos das SKILLS do projeto.
# Complementar ao `.opencode/skills/<name>/SKILL.md` (fonte canonica do conteúdo).
# Ferramentas externas podem descobrir quais skills existem e suas categorias.

version: 1
schema: aimidi.skill.registry/1

# Padrao de um registro:
#   - id:           slug kebab-case (== nome da pasta em .opencode/skills/)
#     name:         nome curto
#     category:     cpp | go | juce | juce | vst3 | clap | grpc | protobuf | sqlite | dsp | midi | theory | llama_cpp | onnx | performance | testing | security | documentation
#     description:  curta
#     file:         .opencode/skills/<id>/SKILL.md
#     required_by_agents:
#       - <agent id>
#     required_by_subagents:
#       - <subagent id>

skills:
  # Performance (dirige Performance Engineer)
  - id: cache-optimization
    category: performance
    required_by_agents: [performance-engineer, dsp-engineer, music-theory-engineer]

